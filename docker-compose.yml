services:
  db:
    image: postgres:18.2-trixie
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password123$
      - POSTGRES_DB=postgres
      - TZ=UTC
      - PGTZ=UTC
    network_mode: host
    volumes:
      - pg_data:/var/lib/postgresql
    restart: no
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 1s
      start_interval: 1s

volumes:
  pg_data:
